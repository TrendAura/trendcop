<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trendaura | Viral News</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:black;
color:white;
text-align:center;
padding:20px;
}

nav{
background:#222;
text-align:center;
padding:10px;
}

nav a{
color:white;
margin:10px;
cursor:pointer;
text-decoration:none;
font-weight:bold;
}

.search{
text-align:center;
background:white;
padding:15px;
}

.search input{
width:60%;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

.container{
display:grid;
grid-template-columns:3fr 1fr;
gap:20px;
max-width:1200px;
margin:auto;
padding:20px;
}

#newsGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.article{
background:white;
border-radius:8px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.article img{
width:100%;
height:170px;
object-fit:cover;
}

.article h3{
margin:10px;
}

.article p{
margin:10px;
font-size:14px;
}

.article a{
display:block;
background:#00bcd4;
color:white;
text-align:center;
padding:10px;
text-decoration:none;
}

.sidebar{
background:white;
padding:15px;
border-radius:8px;
}

.sidebar div{
margin:8px 0;
cursor:pointer;
}

footer{
background:black;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

@media(max-width:900px){
.container{
grid-template-columns:1fr;
}
.search input{
width:90%;
}
}
</style>

</head>

<body>

<header>
<h1>Trendaura</h1>
<p>Celebrity Buzz • Movies • Concerts • TikTok Trends</p>
</header>

<nav>
<a onclick="loadNews('general')">Home</a>
<a onclick="loadNews('entertainment')">Celebrities</a>
<a onclick="loadNews('entertainment')">Movies</a>
<a onclick="loadNews('technology')">TikTok</a>
<a onclick="loadNews('entertainment')">Concerts</a>
</nav>

<div class="search">
<input type="text" id="searchInput" placeholder="Search news...">
</div>

<div class="container">

<div id="newsGrid"></div>

<div class="sidebar">
<h3>🔥 Trending Topics</h3>
<div onclick="searchTopic('celebrity')">Celebrity News</div>
<div onclick="searchTopic('movie')">Movie Trailers</div>
<div onclick="searchTopic('tiktok')">TikTok Trends</div>
<div onclick="searchTopic('concert')">Concert Tours</div>
<div onclick="searchTopic('viral')">Viral Stories</div>
</div>

</div>

<footer>
© 2026 Trendaura
</footer>

<script>

const API_KEY="89a3ba312d4b429d9740e60acb7e5b69";

let page=1;
let currentCategory="general";

function displayNews(articles){

const container=document.getElementById("newsGrid");

articles.forEach(article=>{

const card=document.createElement("div");

card.className="article";

card.innerHTML=`
<img src="${article.urlToImage || 'https://picsum.photos/400/200'}">
<h3>${article.title}</h3>
<p>${article.description || ""}</p>
<a href="${article.url}" target="_blank">Read Full Article</a>
`;

container.appendChild(card);

});

}

async function loadNews(category){

page=1;
currentCategory=category;

document.getElementById("newsGrid").innerHTML="";

const url=\`https://newsapi.org/v2/top-headlines?category=\${category}&language=en&pageSize=12&page=\${page}&apiKey=\${API_KEY}\`;

const res=await fetch(url);
const data=await res.json();

displayNews(data.articles);

}

async function loadMore(){

page++;

const url=\`https://newsapi.org/v2/top-headlines?category=\${currentCategory}&language=en&pageSize=12&page=\${page}&apiKey=\${API_KEY}\`;

const res=await fetch(url);
const data=await res.json();

displayNews(data.articles);

}

function searchTopic(keyword){
document.getElementById("searchInput").value=keyword;
searchNews();
}

async function searchNews(){

const query=document.getElementById("searchInput").value;

const url=\`https://newsapi.org/v2/everything?q=\${query}&language=en&pageSize=12&apiKey=\${API_KEY}\`;

const res=await fetch(url);
const data=await res.json();

document.getElementById("newsGrid").innerHTML="";

displayNews(data.articles);

}

document.getElementById("searchInput").addEventListener("keyup",function(e){

if(e.key==="Enter"){
searchNews();
}

});

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){
loadMore();
}

});

loadNews("general");

</script>

</body>
</html>
